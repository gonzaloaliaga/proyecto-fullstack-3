apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: logistic-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logistic-db-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logistic-db
  template:
    metadata:
      labels:
        app: logistic-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: "logistic-db"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: donaton-global-secrets
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: donaton-global-secrets
                  key: DB_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: logistic-db-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: logistic-db-storage
          persistentVolumeClaim:
            claimName: logistic-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: logistic-db
spec:
  selector:
    app: logistic-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
