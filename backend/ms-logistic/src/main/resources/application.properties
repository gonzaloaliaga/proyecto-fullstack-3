spring.application.name=donaton-logistic
server.port=8085
 
spring.datasource.url=jdbc:postgresql://localhost:5432/logistic_db
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
 
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
 
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.fail-on-missing-locations=false
 
# OpenAPI Configuracion
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

server.tomcat.max-http-response-header-size=16384

# Configuracion GlitchTip / Sentry
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SENTRY_ENVIRONMENT:development}
sentry.traces-sample-rate=1.0
sentry.send-default-pii=false
sentry.exception-resolver-order=-2147483647
