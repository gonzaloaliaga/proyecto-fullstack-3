spring.application.name=donaton-inventory
server.port=8084
 
# 1. Configuración de conexión a PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/inventory_db
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Configuración de JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# 3. Configuración de Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.fail-on-missing-locations=false

# 4. Configuración de Swagger
# Configura el path para que coincida exactamente con la regla que pusimos en el Ingress
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/api-docs

# Esta línea es CRUCIAL en Kubernetes para que Spring respete los headers del Ingress
server.forward-headers-strategy=framework