spring.application.name=donaton-auth-test

# Base de datos H2 en memoria, solo para tests
spring.datasource.url=jdbc:h2:mem:authdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Desactiva Flyway en el contexto de test
spring.flyway.enabled=false

# Claves dummy en Base64 válidas solo para que el contexto cargue
# (NO usar en producción - generadas únicamente para tests)
JWT_PRIVATE_KEY=TVlYWQ==
JWT_PUBLIC_KEY=TVlYWQ==

