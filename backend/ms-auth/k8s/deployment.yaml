apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-auth-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-auth
  template:
    metadata:
      labels:
        app: ms-auth
    spec:
      initContainers:
        - name: wait-for-auth-db
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - "until pg_isready -h auth-db -p 5432 -U user; do echo esperando por auth-db; sleep 2; done;"
      containers:
        - name: ms-auth
          image: proyecto-fullstack-3-ms-auth:latest
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://auth-db:5432/auth-db"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: donaton-global-secrets
                  key: DB_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: donaton-global-secrets
                  key: DB_PASSWORD
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: donaton-global-secrets
                  key: JWT_PRIVATE_KEY
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: donaton-global-secrets
                  key: JWT_PUBLIC_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: ms-auth-service
spec:
  selector:
    app: ms-auth
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081