spring.application.name=donaton-bff-test

# Añadimos H2 por si el BFF tiene dependencias de JPA en algún momento
spring.datasource.url=jdbc:h2:mem:bffdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# Claves falsas para los placeholders del entorno de Test
JWT_PRIVATE_
JWT_PUBLIC_